name: Prepare release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Optional semver bump override (major, minor, or patch)
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: release-prepare
  cancel-in-progress: false

jobs:
  gate:
    name: Full release gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Release prepare must run on main; current ref is ${GITHUB_REF}." >&2
            exit 1
          fi
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run release gate
        run: npm run release:gate

  prepare:
    name: Commit, tag, and dispatch publish
    needs: gate
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Prepare release
        run: |
          args=(--yes)
          if [ -n "${{ inputs.bump }}" ]; then
            args+=("--bump=${{ inputs.bump }}")
          fi
          npm run release:prepare -- "${args[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
